<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Carte OSEYS – Clients & Consultants</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OSEYS Réseau" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #FEF6EF;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    #header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      padding-top: max(14px, env(safe-area-inset-top));
      padding-left: max(24px, env(safe-area-inset-left));
      padding-right: max(24px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    #header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
    #header span { font-size: 0.85rem; color: #aaa; }

    #controls {
      background: #fff;
      padding: 8px 20px;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Filter pills ── */
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid transparent;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
      user-select: none;
      white-space: nowrap;
    }
    #btn-client          { background: #EE824F; color: #fff; border-color: #EE824F; }
    #btn-client.inactive { background: #fff;    color: #EE824F; opacity: .6; }
    #btn-consultant          { background: #C32D4B; color: #fff; border-color: #C32D4B; }
    #btn-consultant.inactive { background: #fff;    color: #C32D4B; opacity: .6; }
    #btn-siege          { background: #8A6564; color: #fff; border-color: #8A6564; }
    #btn-siege.inactive { background: #fff;    color: #8A6564; opacity: .6; }

    .filter-pin {
      width: 10px; height: 16px;
      object-fit: contain;
    }
    .count-badge {
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    #btn-client.inactive .count-badge,
    #btn-consultant.inactive .count-badge {
      background: #f0f0f0;
      color: #666;
    }

    #search-box {
      margin-left: auto;
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 0.85rem;
      outline: none;
      width: 180px;
    }
    #search-box:focus { border-color: #EE824F; }

    /* ── Action buttons ── */
    .action-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
    }
    #map-mode-btn  { background: #FEF6EF; color: #1a1a2e; border: 1px solid #ddd; }
    #map-mode-btn:hover  { background: #f0e8df; }
    #tile-btn        { background: #FEF6EF; color: #1a1a2e; border: 1px solid #ddd; }
    #tile-btn:hover  { background: #f0e8df; }
    #tile-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    #export-btn   { background: #1a1a2e; color: #fff; }
    #export-btn:hover { background: #2e2e4e; }

    /* ── Map mode (full screen) ── */
    body.map-mode #header,
    body.map-mode #controls { display: none; }
    body.map-mode #map { height: 100vh; height: 100dvh; padding-bottom: 0; }

    #exit-map-mode {
      display: none;
      position: fixed;
      top: 14px; right: 14px;
      z-index: 9999;
      padding: 7px 16px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    body.map-mode #exit-map-mode { display: block; }

    #map {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #FEF6EF;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Mobile / iPhone ── */
    @media (max-width: 600px) {
      #header { padding: 10px 16px; padding-top: max(10px, env(safe-area-inset-top)); }
      #header h1 { font-size: 1rem; }
      #controls { padding: 6px 12px; gap: 7px; flex-wrap: nowrap; }
      .filter-btn { padding: 7px 10px; font-size: 0.78rem; min-height: 36px; }
      .action-btn { padding: 7px 10px; font-size: 0.78rem; min-height: 36px; }
      #search-box { width: 130px; min-width: 100px; }
      #export-btn { display: none; }
    }

    /* Custom popup */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      padding: 0;
    }
    .leaflet-popup-content { margin: 0; min-width: 180px; }
    .popup-header {
      padding: 10px 14px 8px;
      border-radius: 10px 10px 0 0;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .popup-header.client     { background: #FF6B00; }
    .popup-header.consultant { background: #CC0000; }
    .popup-header.siege      { background: #7B3F00; }
    .popup-body {
      padding: 8px 14px 10px;
      font-size: 0.85rem;
      color: #333;
    }
    .popup-body .location { color: #666; margin-top: 2px; }
  </style>
</head>
<body>

<div id="header">
  <h1>OSEYS — Réseau Clients &amp; Consultants</h1>
  <span id="subtitle">Carte interactive</span>
</div>

<div id="controls">
  <button class="filter-btn" id="btn-client" onclick="toggleLayer('client')">
    <img class="filter-pin" id="pin-client" />
    Clients <span class="count-badge" id="cnt-client">0</span>
  </button>
  <button class="filter-btn" id="btn-consultant" onclick="toggleLayer('consultant')">
    <img class="filter-pin" id="pin-consultant" />
    Consultants <span class="count-badge" id="cnt-consultant">0</span>
  </button>
  <button class="filter-btn" id="btn-siege" onclick="toggleLayer('siege')">
    <img class="filter-pin" id="pin-siege" />
    Siège
  </button>
  <input id="search-box" type="text" placeholder="Rechercher un nom ou une ville…" oninput="filterMarkers(this.value)" />
  <button class="action-btn" id="tile-btn" onclick="toggleTiles()">🗺 Fond de carte</button>
  <button class="action-btn" id="map-mode-btn" onclick="toggleMapMode()">⛶ Mode carte</button>
  <button class="action-btn" id="export-btn" onclick="exportMap()">⬇ Exporter PNG</button>
</div>
<button id="exit-map-mode" onclick="toggleMapMode()">✕ Quitter le mode carte</button>

<div id="map"></div>

// ─── MARKER STYLE ────────────────────────────────────────────────────────────
// Inspired by the OSEYS logo: swept upward arrow, slim body, fine tip
function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const mix = (c, t=255, f=0.38) => Math.round(c + (t - c) * f);
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function pinSVG(fill, stroke, w, h) {
  const id = fill.slice(1);
  const light = lighten(fill);
  // Arrow shape: slim upward arrow with swept body (like OSEYS logo arrows)
  // Arrowhead: wide triangle at top — shaft: slim, tapers to sharp tip at bottom
  // Slight rightward lean on the shaft to echo the logo's sweep
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 30 50">
  <defs>
    <linearGradient id="g_${id}" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="${light}"/>
      <stop offset="100%" stop-color="${fill}"/>
    </linearGradient>
    <filter id="sh_${id}" x="-50%" y="-20%" width="200%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>
  <!-- Arrow body: arrowhead top, shaft curves slightly right, tapers to fine tip -->
  <path d="M15,2
           L5,15  L11,15
           C11,22 11.5,30 12,37
           C12.5,41 13.5,46 15,48
           C16.5,46 17.5,41 18,37
           C18.5,30 19,22 19,15
           L25,15 Z"
        fill="url(#g_${id})" stroke="${stroke}" stroke-width="0.6"
        stroke-linejoin="round" filter="url(#sh_${id})"/>
  <path d="M15,5 L9,15 L12,15 L15,9 Z"
        fill="white" opacity="0.18"/>
</svg>`;
}

const PINS = {
  CLIENT:     { fill: '#EE824F', stroke: '#c8581a' },
  CONSULTANT: { fill: '#C32D4B', stroke: '#8a1f33' },
  SIEGE:      { fill: '#8A6564', stroke: '#5c3f3e' },
};

function makeIcon(type) {
  const { fill, stroke } = PINS[type];
  const isSiege = type === 'SIEGE';
  const isConsultant = type === 'CONSULTANT';
  const w = isSiege ? 20 : isConsultant ? 15 : 11;
  const h = isSiege ? 33 : isConsultant ? 25 : 18;
  return L.divIcon({
    className: '',
    html: pinSVG(fill, stroke, w, h),
    iconSize:   [w, h],
    iconAnchor: [w / 2, h],
    popupAnchor:[0, -h]
  });
}

function pinSVGSmall(fill, stroke) {
  return `data:image/svg+xml,${encodeURIComponent(pinSVG(fill, stroke, 18, 30))}`;
}

// ─── LAYERS ──────────────────────────────────────────────────────────────────
const layers = { client: L.layerGroup(), consultant: L.layerGroup(), siege: L.layerGroup() };
const allMarkers = [];

data.forEach(d => {
  const layerKey = d.type.toLowerCase();
  const zOffset = d.type === 'SIEGE' ? 2000 : d.type === 'CONSULTANT' ? 1000 : 0;
  const marker = L.marker([d.lat, d.lng], { icon: makeIcon(d.type), zIndexOffset: zOffset });
  const typeClass = d.type === 'CLIENT' ? 'client' : d.type === 'CONSULTANT' ? 'consultant' : 'siege';
  const typeLabel = d.type === 'CLIENT' ? 'Client' : d.type === 'CONSULTANT' ? 'Consultant' : 'Siège';
  marker.bindPopup(`
    <div class="popup-header ${typeClass}">${d.name}</div>
    <div class="popup-body">
      <div>${typeLabel}</div>
      <div class="location">📍 ${d.city}</div>
    </div>
  `);
  marker.addTo(layers[layerKey]);
  allMarkers.push({ marker, data: d, layerKey, visible: true });
});

layers.client.addTo(map);
layers.siege.addTo(map);
layers.consultant.addTo(map);

// ─── COUNTS ──────────────────────────────────────────────────────────────────
const clientCount = data.filter(d => d.type === 'CLIENT').length;
const consultantCount = data.filter(d => d.type === 'CONSULTANT').length;
document.getElementById('cnt-client').textContent = clientCount;
document.getElementById('cnt-consultant').textContent = consultantCount;

// Legend pins
['CLIENT','CONSULTANT','SIEGE'].forEach(type => {
  const { fill, stroke } = PINS[type];
  document.getElementById('pin-' + type.toLowerCase()).src = pinSVGSmall(fill, stroke);
});

// ─── TOGGLE LAYERS ───────────────────────────────────────────────────────────
const layerVisible = { client: true, consultant: true, siege: true };
function toggleLayer(key) {
  if (layerVisible[key]) {
    map.removeLayer(layers[key]);
  } else {
    map.addLayer(layers[key]);
  }
  layerVisible[key] = !layerVisible[key];
  // Update button state (client & consultant only)
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.classList.toggle('inactive', !layerVisible[key]);
}

// ─── TILES TOGGLE ────────────────────────────────────────────────────────────
let tilesActive = false;
function toggleTiles() {
  tilesActive = !tilesActive;
  const btn = document.getElementById('tile-btn');
  if (tilesActive) {
    tileLayer.addTo(map);
    tileLayer.bringToBack();
    labelsLayer.addTo(map);
    franceLabelsMask.addTo(map);
    franceFill.setStyle({ fillOpacity: 0 });
    btn.classList.add('active');
    btn.textContent = '🗺 Masquer le fond';
  } else {
    map.removeLayer(tileLayer);
    map.removeLayer(labelsLayer);
    map.removeLayer(franceLabelsMask);
    franceFill.setStyle({ fillOpacity: 1 });
    btn.classList.remove('active');
    btn.textContent = '🗺 Fond de carte';
  }
}

// ─── MAP MODE ────────────────────────────────────────────────────────────────
function toggleMapMode() {
  document.body.classList.toggle('map-mode');
  map.invalidateSize();
}

// ─── EXPORT PNG ──────────────────────────────────────────────────────────────
async function exportMap() {
  const btn = document.getElementById('export-btn');
  btn.textContent = '⏳ Export…';
  btn.disabled = true;

  const scale = 2;

  // 1. Compute France bounding box in screen pixels
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  FRANCE_GEO.geometry.coordinates.forEach(polygon => {
    polygon[0].forEach(([lng, lat]) => {
      const pt = map.latLngToContainerPoint([lat, lng]);
      if (pt.x < minX) minX = pt.x;
      if (pt.x > maxX) maxX = pt.x;
      if (pt.y < minY) minY = pt.y;
      if (pt.y > maxY) maxY = pt.y;
    });
  });

  // 2. Add 1 cm margin on each side (96 dpi → 1 cm ≈ 38 px)
  const margin = Math.round(96 / 2.54);
  const fW = (maxX - minX) + 2 * margin;
  const fH = (maxY - minY) + 2 * margin;

  // 3. Square crop centred on France
  const side = Math.ceil(Math.max(fW, fH));
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const ox = Math.round(cx - side / 2);
  const oy = Math.round(cy - side / 2);

  const canvas = document.createElement('canvas');
  canvas.width = side * scale;
  canvas.height = side * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // 4. Cream background
  ctx.fillStyle = OSEYS_CREAM;
  ctx.fillRect(0, 0, side, side);

  // 5. Draw France polygons (white fill + border)
  FRANCE_GEO.geometry.coordinates.forEach(polygon => {
    ctx.beginPath();
    polygon[0].forEach(([lng, lat], i) => {
      const pt = map.latLngToContainerPoint([lat, lng]);
      i === 0 ? ctx.moveTo(pt.x - ox, pt.y - oy) : ctx.lineTo(pt.x - ox, pt.y - oy);
    });
    ctx.closePath();
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#51656F';
    ctx.lineWidth = 1.75;
    ctx.stroke();
  });

  // 6. Draw markers in z-order: clients (fond) → siège → consultants (premier plan)
  for (const layerKey of ['client', 'siege', 'consultant']) {
    if (!layerVisible[layerKey]) continue;
    for (const { marker, layerKey: lk } of allMarkers) {
      if (lk !== layerKey) continue;
      const pt = map.latLngToContainerPoint(marker.getLatLng());
      const x = pt.x - ox;
      const y = pt.y - oy;
      const icon = marker.options.icon;
      const [w, h] = icon.options.iconSize;
      const [ax, ay] = icon.options.iconAnchor;
      const blob = new Blob([icon.options.html], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      await new Promise(resolve => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, x - ax, y - ay, w, h); URL.revokeObjectURL(url); resolve(); };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        img.src = url;
      });
    }
  }

  // 7. Download
  const a = document.createElement('a');
  a.download = 'carte_oseys.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  btn.textContent = '⬇ Exporter PNG';
  btn.disabled = false;
}

// ─── SERVICE WORKER (PWA) ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ─── SEARCH / FILTER ─────────────────────────────────────────────────────────
function filterMarkers(query) {
  const q = query.trim().toLowerCase();
  allMarkers.forEach(({ marker, data, layerKey }) => {
    const match = !q
      || data.name.toLowerCase().includes(q)
      || data.city.toLowerCase().includes(q);
    if (match) {
      if (!layers[layerKey].hasLayer(marker)) layers[layerKey].addLayer(marker);
    } else {
      if (layers[layerKey].hasLayer(marker)) layers[layerKey].removeLayer(marker);
    }
  });
}
